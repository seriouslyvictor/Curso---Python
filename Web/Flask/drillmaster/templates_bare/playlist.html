<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist</title>
    <style>
        body {
            box-sizing: border-box;
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #1db954, #121212 38%, #050505 100%);
            color: white;
            padding: 32px;
            height: 100vh;
        }

        a {
            color: #b3ffcb;
            text-decoration: none;
            font-weight: bold;
        }

        h1 {
            margin-top: 18px;
            margin-bottom: 24px;
        }

        section {
            max-width: 700px;
            background-color: rgba(24, 24, 24, 0.92);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.28);
        }

        h2 {
            margin-top: 0;
            font-size: 30px;
        }

        p {
            color: #b3b3b3;
            margin-bottom: 22px;
        }

        ol {
            padding-left: 24px;
            margin-bottom: 0;
        }

        li {
            padding: 10px 0;
            border-bottom: 1px solid #2b2b2b;
        }
    </style>
</head>
<body>
    <h1>2b - Playlist</h1>

    <section>
        <h2>Minha playlist no Spotify</h2>
        <p> musicas nessa playlist</p>
        <ol>
            <li></li>
        </ol>
    </section>
</body>
</html>
