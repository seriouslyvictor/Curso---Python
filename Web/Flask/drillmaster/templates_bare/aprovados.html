<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovados</title>
    <style>
        body {
            box-sizing: border-box;
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #fff5f5, #ffe2e2, #ffd1d1);
            color: #2b2b2b;
            padding: 32px;
            height: 100vh;
        }

        a {
            color: #b20000;
            text-decoration: none;
            font-weight: bold;
        }

        h1 {
            margin-top: 18px;
            margin-bottom: 24px;
            color: #b20000;
        }

        section {
            max-width: 620px;
            background-color: white;
            border-left: 8px solid #b20000;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 22px rgba(178, 0, 0, 0.12);
        }

        h2 {
            margin-top: 0;
            color: #444444;
        }

        ul {
            margin-bottom: 0;
        }

        li {
            margin-bottom: 12px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>2a - Candidatos Aprovados</h1>

    <section>
        <h2>Lista de aprovados da Fatec</h2>
        <ul>
            <li></li>
        </ul>
    </section>

</html>
