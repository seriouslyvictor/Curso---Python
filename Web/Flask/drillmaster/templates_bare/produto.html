<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(45deg, #fff7b8, #fff159, #ffe680);
            color: #333333;
            padding: 32px;
            height: 100vh;
        }

        a {
            color: #3483fa;
            text-decoration: none;
            font-weight: bold;
        }

        h1 {
            margin-top: 18px;
            margin-bottom: 24px;
            font-size: 28px;
        }

        section {
            display: flex;
            gap: 28px;
            align-items: flex-start;
            background-color: white;
            border-radius: 8px;
            padding: 28px;
            max-width: 900px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
        }

        img {
            width: 260px;
            background-color: white;
            border: 1px solid #eeeeee;
            border-radius: 8px;
            padding: 16px;
        }

        article {
            flex: 1;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 26px;
            font-weight: normal;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 18px;
            font-size: 36px;
            color: #333333;
        }

        p {
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .detalhe {
            color: #666666;
        }
    </style>
</head>
<body>
    <a href="/">Voltar para todos os exercicios</a>
    <h1>1b - Cartao de Produto (iPhone)</h1>

    <section>
        <img src="" alt="">
        <article>
            <h2></h2>
            <p class="detalhe">Novo | 25 vendidos</p>
            <h3>R$ ,00</h3>
            <p class="detalhe">em 12x de  sem juros</p>
            <p></p>
            <p>Armazenamento: </p>
            <p class="detalhe">Frete gratis para todo o Brasil</p>
        </article>
    </section>
</body>
</html>
