<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serie</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #2d0000, #120000, #000000);
            color: white;
            padding: 32px;
            box-sizing: border-box;
            height: 100vh;
        }

        a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
        }

        h1 {
            margin-top: 18px;
            margin-bottom: 24px;
        }

        section {
            max-width: 680px;
            background-color: rgba(18, 18, 18, 0.94);
            border: 1px solid #3b3b3b;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 18px 34px rgba(0, 0, 0, 0.45);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 18px;
            font-size: 34px;
        }

        p {
            margin-bottom: 0;
            font-size: 20px;
        }

        strong {
            color: #e50914;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <h1>2c - Nota de Serie da Netflix</h1>

    <section>
        <strong>NETFLIX</strong>
        <h2></h2>
        <p>Nota da serie:</p>
        <p></p>
    </section>
</body>
</html>
