<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #2d1b20;
            padding: 32px;
        }

        a {
            color: #ea1d2c;
            text-decoration: none;
            font-weight: bold;
        }

        h1 {
            margin-top: 18px;
            margin-bottom: 24px;
            font-size: 28px;
        }

        section {
            max-width: 520px;
            background-color: #ffffff;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 14px 35px rgba(234, 29, 44, 0.12);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 6px;
            color: #ea1d2c;
            font-size: 24px;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #666666;
            font-size: 16px;
            font-weight: normal;
        }

        p {
            margin-bottom: 14px;
            line-height: 1.5;
        }

        hr {
            border: none;
            border-top: 1px solid #f1c7cd;
            margin: 20px 0;
        }

        .total {
            font-size: 22px;
            font-weight: bold;
            color: #ea1d2c;
        }
    </style>
</head>
<body>
    <h1>1c - Recibo de Pedido</h1>

    <section>
        <h2>iFood</h2>
        <h3>Resumo do seu pedido</h3>
        <p>Item: </p>
        <p>Quantidade: </p>
        <p>Preco unitario: R$ ,00</p>
        <hr>
        <p> x  = R$ ,00</p>
        <p class="total">Total do pedido: R$ ,00</p>
    </section>
</body>
</html>
