<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="page">
        <a class="back-link" href="/">Voltar para todos os exercicios</a>
        <h1>3b - Pagina de Clima</h1>

        <div class="card">
            <h2>{{ cidade }}</h2>
            <p>Temperatura: {{ temperatura }} C</p>

            {% if temperatura < 10 %}
                <p>🥶 Muito frio</p>
            {% elif temperatura <= 25 %}
                <p>🙂 Clima agradavel</p>
            {% else %}
                <p>🥵 Muito quente</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
