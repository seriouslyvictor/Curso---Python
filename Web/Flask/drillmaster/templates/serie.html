<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serie</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="page">
        <a class="back-link" href="/">Voltar para todos os exercicios</a>
        <h1>2c - Nota de Serie da Netflix</h1>

        <div class="card">
            <h2>{{ nome_serie }}</h2>
            <p>
                {% for _ in range(estrelas) %}
                    <span class="star">★</span>
                {% endfor %}
            </p>
        </div>
    </div>
</body>
</html>
