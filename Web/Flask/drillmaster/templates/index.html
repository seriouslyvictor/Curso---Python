<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressao de Exercicios Jinja</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="page">
        <h1>Sessao 2 - Bloco 3</h1>
        <p>Este app mostra todos os exercicios da progressao de Jinja dentro do mesmo projeto Flask.</p>

        <div class="section-box">
            <h2>Nivel 1 ate Nivel 4</h2>
            <ul class="link-list">
                {% for exercicio in exercicios %}
                    <li>
                        <a href="{{ url_for(exercicio.endpoint) }}">{{ exercicio.titulo }}</a>
                    </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
