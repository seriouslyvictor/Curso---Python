<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="page">
        <a class="back-link" href="/">Voltar para todos os exercicios</a>
        <h1>2b - Playlist</h1>

        <div class="card">
            <p>{{ musicas|length }} musicas nessa playlist</p>
            <ol>
                {% for musica in musicas %}
                    <li>{{ musica }}</li>
                {% endfor %}
            </ol>
        </div>
    </div>
</body>
</html>
